<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow · Smart Todo</title>
  <!-- favicon (material check) -->
  <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231976d2'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z'/%3E%3C/svg%3E" />
  <!-- Font Awesome 6 (free) for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo-area">
    <i class="fas fa-circle-check logo-icon"></i>
    <h1>TaskFlow</h1>
  </div>
  <div id="user-info">
    <div class="greeting-wrapper">
      <i class="fas fa-user-circle"></i>
      <span id="username">Not signed in</span>
    </div>
    <button class="btn btn-outline" id="login-btn"><i class="fab fa-google"></i> Sign in</button>
    <button class="btn btn-primary" id="logout-btn" style="display:none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    <div id="clock"></div>
  </div>
</header>

<main id="app" style="display:none;">
  <div class="glass-panel">
    <!-- ADD TASK FORM -->
    <form id="task-form" class="task-form">
      <div class="input-group">
        <label><i class="fas fa-tag"></i> Title</label>
        <input type="text" id="title" class="input-field" placeholder="e.g., design review" required minlength="1" />
      </div>
      <div class="input-group">
        <label><i class="fas fa-flag"></i> Priority</label>
        <select id="priority" class="input-field" required>
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟠 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="input-group">
        <label><i class="fas fa-calendar"></i> Due</label>
        <input type="date" id="due-date" class="input-field" required />
      </div>
      <div class="input-group">
        <label><i class="fas fa-coins"></i> Spend (₹)</label>
        <input type="number" id="spend" class="input-field" placeholder="0" min="0" value="0" />
      </div>
      <button type="submit" class="btn-add"><i class="fas fa-plus-circle"></i> Add task</button>
    </form>

    <!-- TASKS TABLE -->
    <div class="table-wrapper">
      <table id="task-table">
        <thead>
          <tr>
            <th><i class="fas fa-check-circle"></i> Done</th>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Due date</th>
            <th>Spent (₹)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tasks-body"></tbody>
        <tfoot>
          <tr>
            <td colspan="5" style="text-align:right; font-size:1rem;">Total spent:</td>
            <td id="total-spend">₹0.00</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>

    <!-- CALENDAR VIEW (grouped by date) -->
    <section style="margin-top: 2rem;">
      <h2 style="display: flex; align-items: center; gap: 12px; color: #0d3f6b;"><i class="fas fa-calendar-alt"></i> Calendar snapshot</h2>
      <div id="calendar-content" class="calendar-grid"></div>
    </section>
  </div>
</main>

<footer>
  <i class="fas fa-cloud-sun"></i> Organized with clarity · Firebase realtime sync
</footer>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<!-- External JavaScript -->
<script src="firebase-todo.js"></script>

</body>
</html>
